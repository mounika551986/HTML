<form action="/register" method="POST" autocomplete="on">
  
  <!-- Username with length limits and autofocus -->
  <div>
    <label for="username">Username (5-15 chars):</label>
    <input type="text" id="username" name="username" minlength="5" maxlength="15" autofocus required>
  </div>

  <!-- Ticket Quantity with min/max and step rules -->
  <div>
    <label for="tickets">Tickets (Max 5, pairs only):</label>
    <input type="number" id="tickets" name="tickets" min="2" max="6" step="2" value="2">
  </div>

  <!-- Promo Code with pattern validation (3 capital letters) -->
  <div>
    <label for="promo">Promo Code (e.g., ABC):</label>
    <input type="text" id="promo" name="promo" pattern="[A-Z]{3}" placeholder="XYZ">
  </div>

  <!-- File Upload allowing multiple files -->
  <div>
    <label for="docs">Upload Receipts:</label>
    <input type="file" id="docs" name="docs" multiple>
  </div>

  <button type="submit">Submit</button>
</form>


</forms>
